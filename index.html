<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
     <div class="tray">
      <div class="head"><h4>Currency Converter <img src="./icons/dollar-to-euro.png" alt="" width="35px"></h4></div>

      <div class="amount">
              <div class="form-floating mb-3">
              <input type="text" class="form-control" id="floatingInput" placeholder="name@example.com">
              <label for="floatingInput">Amount</label>
            </div>
      </div>

<div class="converter">

    <div class="form-floating">
        <select class="form-select" id="fromCurrency">
        </select>
        <label>From</label>
    </div>

    <div class="form-floating">
        <select class="form-select" id="toCurrency">
        </select>
        <label>To</label>
    </div>

</div>

<div class="mt-4">
    <button class="btn btn-dark" id="convertBtn">
        Convert
    </button>
</div>

<h3 class="mt-3 text-light" id="result"></h3>
      
     </div>

     <script>
      const currencies = {
    USD: "US Dollar",
    INR: "Indian Rupee",
    EUR: "Euro",
    GBP: "British Pound",
    JPY: "Japanese Yen",
    AUD: "Australian Dollar",
    CAD: "Canadian Dollar",
    CHF: "Swiss Franc",
    CNY: "Chinese Yuan",
    SGD: "Singapore Dollar"
};

const fromCurrency = document.getElementById("fromCurrency");
const toCurrency = document.getElementById("toCurrency");
const convertBtn = document.getElementById("convertBtn");
const result = document.getElementById("result");
const amountInput = document.getElementById("floatingInput");

// Populate dropdowns
for (let code in currencies) {
    fromCurrency.innerHTML += `
        <option value="${code}">
            ${code}
        </option>
    `;

    toCurrency.innerHTML += `
        <option value="${code}">
            ${code}
        </option>
    `;
}

// Default values
fromCurrency.value = "USD";
toCurrency.value = "INR";

// Convert button click
convertBtn.addEventListener("click", async () => {

    const amount = Number(amountInput.value);

    if (!amount || amount <= 0) {
        result.innerText = "Enter a valid amount";
        return;
    }

    const from = fromCurrency.value;
    const to = toCurrency.value;

    result.innerText = "Converting...";

    try {

        const response = await fetch(
            `https://open.er-api.com/v6/latest/${from}`
        );

        const data = await response.json();

        if (data.result !== "success") {
            result.innerText = "Unable to fetch rates";
            return;
        }

        const rate = data.rates[to];

        const convertedAmount = amount * rate;

        result.innerText =
            `${amount} ${from} = ${convertedAmount.toFixed(2)} ${to}`;

    } catch (error) {

        console.error(error);
        result.innerText = "Something went wrong";

    }
});
     </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
